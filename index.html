<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="color-scheme" content="light" />
  <title>간호 단어 퀴즈</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <button class="brand" id="brandBtn" type="button" aria-label="홈으로 이동">
      <span class="brand-mark" aria-hidden="true">N</span>
      <span class="brand-text">간호 단어 퀴즈</span>
    </button>
    <nav class="topnav">
      <button class="navlink" data-route="home" type="button">홈</button>
      <button class="navlink" data-route="history" type="button">학습 기록</button>
    </nav>
  </header>

  <main id="main" class="main" aria-live="polite">
    <!-- ===== Home ===== -->
    <section class="screen" id="screen-home">
      <h1 class="screen-title">과목을 선택하세요</h1>
      <p class="screen-sub">학습 기록은 이 브라우저에만 저장됩니다.</p>

      <div class="count-picker" id="countPicker" role="radiogroup" aria-label="문항 수">
        <span class="count-label">문항 수</span>
        <!-- count chips injected here -->
      </div>

      <div id="subjectGrid" class="subject-grid">
        <!-- subject cards injected here -->
        <div class="loading" id="loadingMsg">단어 데이터를 불러오는 중…</div>
      </div>

      <div class="home-actions">
        <button class="btn btn-secondary" id="goHistoryBtn" type="button">학습 기록 보기</button>
      </div>
    </section>

    <!-- ===== Quiz ===== -->
    <section class="screen" id="screen-quiz" hidden>
      <div class="quiz-header">
        <button class="link-btn" id="quitQuizBtn" type="button">← 그만두기</button>
        <div class="quiz-progress">
          <span id="qIndex">1</span> / <span id="qTotal">40</span>
        </div>
        <div class="quiz-score">
          정답 <span id="qCorrect">0</span>
        </div>
      </div>

      <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>

      <div class="question" id="questionBox">
        <!-- question content inserted here -->
      </div>

      <div class="feedback" id="feedbackBox" hidden></div>
    </section>

    <!-- ===== Result ===== -->
    <section class="screen" id="screen-result" hidden>
      <h1 class="screen-title">결과</h1>
      <div class="result-summary" id="resultSummary"></div>

      <div class="result-section">
        <h2>틀린 문항</h2>
        <ul class="wrong-list" id="wrongList"></ul>
      </div>

      <div class="screen-actions">
        <button class="btn btn-primary" id="retryBtn" type="button">다시 풀기</button>
        <button class="btn btn-secondary" id="backHomeBtn" type="button">홈으로</button>
      </div>
    </section>

    <!-- ===== History ===== -->
    <section class="screen" id="screen-history" hidden>
      <h1 class="screen-title">학습 기록</h1>
      <p class="screen-sub">이 기록은 이 브라우저에만 저장됩니다. 다른 기기/시크릿 모드/캐시 삭제 시 사라집니다.</p>

      <div class="history-grid">
        <section class="history-section">
          <h2>최근 시도</h2>
          <ul class="attempt-list" id="attemptList"></ul>
        </section>

        <section class="history-section">
          <h2>자주 틀린 단어 Top 10</h2>
          <ul class="freq-wrong-list" id="freqWrongList"></ul>
        </section>
      </div>

      <div class="screen-actions">
        <button class="btn btn-danger" id="resetDataBtn" type="button">학습 기록 초기화</button>
        <button class="btn btn-secondary" id="historyBackBtn" type="button">홈으로</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <small>© 간호 단어 퀴즈 · 데이터는 브라우저 localStorage에 저장됩니다</small>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
